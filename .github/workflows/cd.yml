name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Build and publish Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dépot
        uses: actions/checkout@v4

      - name: Créer fichier .env pour le build
        run: |
          echo "MYSQL_HOST=mysql" >> .env
          echo "MONGODB_HOST=mongo" >> .env
          echo "MONGODB_PORT=27017" >> .env
          echo "MYSQL_DB_NAME=labo01_db" >> .env
          echo "DB_USERNAME=labo01" >> .env
          echo "DB_PASSWORD=labo01" >> .env
          echo "MONGODB_DB_NAME=labo01_db" >> .env
          echo "MONGODB_USERNAME=labo01" >> .env
          echo "MONGODB_PASSWORD=labo01" >> .env

      - name: Préparer le nom de l'image
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Construire et publier l'image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
